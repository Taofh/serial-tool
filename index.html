<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serial Tool Pro</title>
<link rel="stylesheet" href="assets/css/tabler-icons.min.css">
<link rel="stylesheet" href="assets/css/font-awesome.min.css">
<style>
@font-face {
    font-family: 'JetBrains Mono Local';
    font-style: normal;
    font-weight: 400;
    src: url('assets/fonts/JetBrainsMono-Regular.woff') format('woff');
    font-display: swap;
}
:root {
    --bg-base:      #0d1117;
    --bg-surface:    #161b22;
    --bg-surface2:   #1c2333;
    --bg-hover:      #1f2a3a;
    --border:         #30363d;
    --border-light:   #484f58;
    --text-1:        #e6edf3;
    --text-2:        #8b949e;
    --text-3:        #6e7681;
    --accent:         #58a6ff;
    --accent-dim:     rgba(88,166,255,0.12);
    --green:          #3fb950;
    --green-dim:      rgba(63,185,80,0.10);
    --green-glow:     rgba(63,185,80,0.35);
    --blue:           #58a6ff;
    --blue-dim:       rgba(88,166,255,0.10);
    --yellow:         #d29922;
    --red:            #f85149;
    --radius:         6px;
    --transition:      0.18s cubic-bezier(.4,0,.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; font-family:'JetBrains Mono Local','JetBrains Mono','Courier New',monospace; font-size:13px; background:var(--bg-base); color:var(--text-1); overflow:hidden; }

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-light); }

/* ===== 布局 ===== */
.app { display:flex; flex-direction:column; height:100vh; }

/* --- 顶部栏 --- */
.topbar {
    height:42px; display:flex; align-items:center; gap:12px;
    padding:0 14px; flex-shrink:0;
    background: var(--bg-surface);
    border-bottom:1px solid var(--border);
    user-select:none;
}
.topbar .brand { display:flex; align-items:center; gap:9px; flex-shrink:0; }
.topbar .brand-logo {
    width:26px; height:26px; border-radius:7px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:13px;
    box-shadow: 0 2px 8px rgba(99,102,241,0.35);
}
.topbar .brand-name { font-size:14px; font-weight:700; letter-spacing:0.3px; }
.topbar .brand-name span { color:var(--accent); font-weight:400; font-size:12px; margin-left:4px; opacity:0.7; }
.topbar .conn-badge {
    display:flex; align-items:center; gap:6px;
    font-size:11.5px; color:var(--text-3); padding:3px 10px;
    background:var(--bg-surface2); border-radius:20px;
    border:1px solid var(--border); flex-shrink:0;
}
.topbar .conn-dot {
    width:7px; height:7px; border-radius:50%; background:var(--text-3);
    transition: var(--transition);
}
.topbar .conn-dot.on { background:var(--green); box-shadow:0 0 6px var(--green-glow); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 4px var(--green-glow);} 50%{box-shadow:0 0 10px var(--green-glow),0 0 20px rgba(63,185,80,0.13);} }
.topbar .spacer { flex:1; }
.topbar .top-actions { display:flex; gap:2px; }
.topbar .top-actions button {
    width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    background:transparent; border:1px solid transparent; border-radius:var(--radius);
    color:var(--text-2); cursor:pointer; font-size:15px;
    transition: var(--transition);
}
.topbar .top-actions button:hover { background:var(--bg-hover); color:var(--text-1); border-color:var(--border); }

/* --- 工具栏（内联到顶部栏） --- */
.toolbar-inline {
    display:flex; align-items:center; gap:6px;
    margin-left:12px;
    padding-left:12px;
    border-left:1px solid var(--border);
}
.tb-group {
    display:flex; align-items:center; gap:5px;
    padding-right:10px; margin-right:10px;
    border-right:1px solid var(--border);
}
.tb-group:last-child { border-right:none; margin-right:0; padding-right:0; }
.tb-label { font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }

select, .tb-input {
    background:var(--bg-surface2); border:1px solid var(--border);
    color:var(--text-1); border-radius:var(--radius);
    font-family:inherit; font-size:12px;
    padding:4px 7px; outline:none;
    transition: border-color var(--transition), box-shadow var(--transition);
    position:relative; z-index:10;
}
select:focus, .tb-input:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-dim); }
select { cursor:pointer; padding-right:18px; }
select option { background:var(--bg-surface); }

/* 按钮 */
.btn {
    display:inline-flex; align-items:center; justify-content:center; gap:5px;
    padding:5px 13px; font-size:12px; font-family:inherit;
    border-radius:var(--radius); border:1px solid transparent;
    cursor:pointer; transition:all var(--transition); white-space:nowrap;
    user-select:none; font-weight:500;
}
.btn:active { transform:scale(0.96); }
.btn-primary {
    background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
    color:#fff; border-color:rgba(63,185,80,0.25);
    box-shadow:0 1px 3px rgba(63,185,80,0.18);
}
.btn-primary:hover { background:linear-gradient(135deg,#2ea043,#3fb950); box-shadow:0 2px 10px rgba(63,185,80,0.28); }
.btn-primary.is-connected { background:linear-gradient(135deg,#da3633,#f85149); border-color:rgba(248,81,73,0.25); box-shadow:0 1px 3px rgba(248,81,73,0.18); }
.btn-primary.is-connected:hover { background:linear-gradient(135deg,#f85149,#ff6b6b); }
.btn-secondary { background:var(--bg-surface2); color:var(--text-2); border-color:var(--border); }
.btn-secondary:hover { background:var(--bg-hover); color:var(--text-1); border-color:var(--border-light); }
.btn-icon {
    width:28px; height:28px; padding:0; display:inline-flex; align-items:center; justify-content:center;
    background:var(--bg-surface2); border:1px solid var(--border); border-radius:var(--radius);
    color:var(--text-2); cursor:pointer; font-size:14px; transition:all var(--transition);
}
.btn-icon:hover { background:var(--bg-hover); color:var(--text-1); border-color:var(--border-light); }

/* --- 主体 --- */
.main { display:flex; flex:1; overflow:hidden; }

/* --- 终端面板 --- */
.panel-left { flex:1; display:flex; flex-direction:column; min-width:0; border-right:1px solid var(--border); }

.terminal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:5px 14px; flex-shrink:0;
    background:var(--bg-surface);
    border-bottom:1px solid var(--border);
    font-size:11.5px; color:var(--text-2);
}
.terminal-header .l { display:flex; align-items:center; gap:7px; }
.terminal-header .dot { width:5px; height:5px; border-radius:50%; background:var(--accent); }
.terminal-header .r { display:flex; align-items:center; gap:7px; }
.terminal-header select { font-size:11px; padding:3px 5px; }

#terminal {
    flex:1; overflow-y:auto; padding:8px 0;
    background:var(--bg-base);
}
#terminal .empty-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; color:var(--text-3); gap:10px; font-size:13px;
}
#terminal .empty-state i { font-size:36px; opacity:0.18; }

/* 终端行 - 单行紧凑布局 */
.line {
    display:flex; align-items:baseline; gap:0;
    padding:1px 10px; line-height:1.6;
    animation: lineIn 0.12s ease-out;
    transition: background var(--transition);
    font-size:12px;
}
@keyframes lineIn { from{opacity:0;transform:translateY(2px);} to{opacity:1;transform:translateY(0);} }
.line:hover { background:var(--bg-hover); }
.line.tx-line { background:var(--green-dim); }
.line.rx-line { background:var(--blue-dim); }

/* 时间戳 + 方向 + 数据 全部在一行 */
.line .ts {
    color:var(--text-3); font-size:10px;
    margin-right:6px; flex-shrink:0;
    font-variant-numeric:tabular-nums; user-select:none;
    opacity:0.7;
}
.line .dir {
    display:inline-block; font-size:9px; font-weight:700;
    width:26px; text-align:center; border-radius:3px;
    padding:0 2px; margin-right:6px; flex-shrink:0;
    text-transform:uppercase; letter-spacing:0.3px;
    line-height:1.4;
}
.line .dir.tx { color:var(--green); background:var(--green-dim); }
.line .dir.rx { color:var(--blue); background:var(--blue-dim); }
.line .dir.sys { color:var(--yellow); background:rgba(210,153,34,0.08); }

.line .data { color:var(--text-1); word-break:break-all; flex:1; }
.line .data .hex { font-family:inherit; }
.line .data .ascii-hint { color:var(--text-3); font-size:10.5px; margin-left:8px; opacity:0.6; }

/* --- 发送栏 --- */
.send-bar {
    display:flex; align-items:center; gap:7px;
    padding:7px 14px; flex-shrink:0;
    background:var(--bg-surface);
    border-top:1px solid var(--border);
}
.send-format { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-3); flex-shrink:0; }
.send-format select { padding:4px 5px; font-size:11px; }

#sendInput {
    flex:1; background:var(--bg-surface2); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text-1);
    padding:6px 10px; font-size:12.5px; font-family:inherit;
    outline:none; transition:border-color var(--transition),box-shadow var(--transition);
}
#sendInput:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-dim); }
#sendInput::placeholder { color:var(--text-3); }

.send-bar .btn-send {
    padding:5px 16px; background:linear-gradient(135deg,#238636,#2ea043);
    color:#fff; border:none; border-radius:var(--radius);
    cursor:pointer; font-size:12px; font-family:inherit; font-weight:500;
    display:inline-flex; align-items:center; gap:5px;
    box-shadow:0 1px 3px rgba(63,185,80,0.2);
    transition:all var(--transition);
}
.send-bar .btn-send:hover { background:linear-gradient(135deg,#2ea043,#3fb950); box-shadow:0 2px 10px rgba(63,185,80,0.3); }
.send-bar .btn-send:active { transform:scale(0.96); }

.send-bar .btn-file {
    padding:5px 10px; background:var(--bg-surface2); color:var(--text-2);
    border:1px solid var(--border); border-radius:var(--radius);
    cursor:pointer; font-size:11px; font-family:inherit;
    transition:all var(--transition);
}
.send-bar .btn-file:hover { background:var(--bg-hover); color:var(--text-1); border-color:var(--border-light); }

/* 快捷命令 */
.quick-bar {
    display:flex; align-items:center; gap:4px; flex-wrap:wrap;
    padding:5px 14px; flex-shrink:0;
    background:var(--bg-surface);
    border-top:1px solid var(--border);
}
.quick-bar .qlabel { font-size:10.5px; color:var(--text-3); margin-right:4px; text-transform:uppercase; letter-spacing:0.4px; }
.quick-bar .btn-q {
    padding:3px 9px; font-size:11px; font-family:inherit;
    background:var(--bg-surface2); color:var(--text-2);
    border:1px solid var(--border); border-radius:4px;
    cursor:pointer; transition:all var(--transition);
}
.quick-bar .btn-q:hover { background:var(--accent-dim); color:var(--accent); border-color:rgba(88,166,255,0.25); }

/* --- 右侧面板 --- */
.panel-right {
    width:260px; display:flex; flex-direction:column;
    background:var(--bg-surface); flex-shrink:0;
    overflow-y:auto;
}
.panel-right::-webkit-scrollbar { width:4px; }

.psec { padding:12px 13px; border-bottom:1px solid var(--border); }
.psec:last-child { border-bottom:none; }
.psec-title {
    display:flex; align-items:center; gap:6px;
    font-size:10.5px; font-weight:600; color:var(--text-2);
    text-transform:uppercase; letter-spacing:0.7px; margin-bottom:9px;
}
.psec-title i { font-size:14px; color:var(--accent); }

/* 搜索 */
.search-box { display:flex; gap:5px; margin-bottom:6px; }
.search-box input {
    flex:1; background:var(--bg-surface2); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text-1);
    padding:5px 8px; font-size:12px; font-family:inherit;
    outline:none; transition:border-color var(--transition);
}
.search-box input:focus { border-color:var(--accent); }

/* 统计卡 */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.stat-card {
    background:var(--bg-surface2); border:1px solid var(--border);
    border-radius:var(--radius); padding:8px 6px; text-align:center;
    transition:border-color 0.25s, box-shadow 0.35s;
}
.stat-card.flash { border-color:var(--accent); box-shadow:0 0 8px var(--accent-dim); }
.stat-card label { display:block; font-size:9.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:2px; }
.stat-card .v { font-size:16px; font-weight:700; color:var(--accent); font-family:inherit; }

/* 设置项 */
.setting-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:6px; font-size:12px;
}
.setting-row label { color:var(--text-2); }
.setting-row input, .setting-row select {
    width:90px; padding:3px 5px; font-size:11.5px;
}

/* Checkbox */
.chk { display:flex; align-items:center; gap:7px; margin-bottom:5px; font-size:12px; cursor:pointer; }
.chk input[type="checkbox"] {
    appearance:none; width:14px; height:14px; flex-shrink:0;
    border:1.5px solid var(--border-light); border-radius:3px;
    background:var(--bg-surface2); cursor:pointer;
    transition:all var(--transition); position:relative;
}
.chk input[type="checkbox"]:checked { background:var(--accent); border-color:var(--accent); }
.chk input[type="checkbox"]:checked::after {
    content:''; position:absolute; left:3.5px; top:0.5px;
    width:5px; height:8px;
    border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);
}
.chk label { color:var(--text-1); cursor:pointer; }

/* 连接信息 */
.info-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:4px; font-size:11.5px;
}
.info-row label { color:var(--text-3); font-size:10.5px; }

/* ===== 动画 ===== */
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
</style>
</head>
<body>
<div class="app">

    <!-- 顶部栏 + 工具栏 合并 -->
    <div class="topbar">
        <div class="brand">
            <div class="brand-logo"><i class="ti ti-plug" style="font-size:14px;"></i></div>
            <div class="brand-name">Serial Tool <span>Pro</span></div>
        </div>
        <div class="conn-badge">
            <div class="conn-dot" id="connDot"></div>
            <span id="connLabel">未连接</span>
        </div>
        <div class="toolbar-inline">
            <div class="tb-group">
                <span class="tb-label">设备</span>
                <select id="portSelect" style="min-width:120px;">
                    <option value="">-- 点击+添加 --</option>
                </select>
                <button class="btn-icon" onclick="requestNewPort()" title="添加设备"><i class="ti ti-plus" style="font-size:13px;"></i></button>
                <button class="btn-icon" onclick="removeSelectedPort()" title="删除选中设备"><i class="ti ti-minus" style="font-size:13px;"></i></button>
            </div>
            <div class="tb-group">
                <span class="tb-label">波特率</span>
                <select id="baudRate">
                    <option value="9600">9600</option>
                    <option value="19200">19200</option>
                    <option value="38400">38400</option>
                    <option value="57600">57600</option>
                    <option value="115200" selected>115200</option>
                    <option value="230400">230400</option>
                    <option value="460800">460800</option>
                    <option value="921600">921600</option>
                </select>
            </div>
            <div class="tb-group">
                <span class="tb-label">数据</span>
                <select id="dataBits"><option value="7">7</option><option value="8" selected>8</option></select>
                <span class="tb-label" style="margin-left:2px;">停</span>
                <select id="stopBits"><option value="1" selected>1</option><option value="2">2</option></select>
                <span class="tb-label" style="margin-left:2px;">校</span>
                <select id="parity"><option value="none" selected>无</option><option value="even">偶</option><option value="odd">奇</option></select>
            </div>
            <div class="tb-group">
                <button class="btn btn-primary" id="connectBtn" onclick="toggleConnection()">
                    <i class="ti ti-plug-connected" style="font-size:13px;"></i>
                    <span id="connectText">连接</span>
                </button>
            </div>
        </div>
        <div class="spacer"></div>
        <div class="top-actions">
            <button title="清空终端" onclick="clearTerminal()"><i class="ti ti-trash" style="font-size:15px;"></i></button>
            <button title="导出数据" onclick="exportData()"><i class="ti ti-download" style="font-size:15px;"></i></button>
            <button title="关于"><i class="ti ti-info-circle" style="font-size:15px;"></i></button>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main">
        <!-- 终端 -->
        <div class="panel-left">
            <div class="terminal-header">
                <div class="l">
                    <div class="dot"></div>
                    终端
                    <span style="color:var(--text-3);font-size:10.5px;" id="lineCount">0 行</span>
                </div>
                <div class="r">
                    <span style="color:var(--text-3);font-size:10.5px;">编码</span>
                    <select id="rxEncoding">
                        <option value="utf-8" selected>UTF-8</option>
                        <option value="gbk">GBK</option>
                    </select>
                </div>
            </div>
            <div id="terminal">
                <div class="empty-state">
                    <i class="ti ti-terminal-2"></i>
                    <span>连接串口设备后开始接收数据</span>
                </div>
            </div>

            <!-- 发送栏 -->
            <div class="send-bar">
                <div class="send-format">
                    <span>格式</span>
                    <select id="sendFormat">
                        <option value="ascii" selected>ASCII</option>
                        <option value="hex">HEX</option>
                    </select>
                </div>
                <div class="send-format" style="margin-left:4px;">
                    <span>追加</span>
                    <select id="appendMode">
                        <option value="none" selected>无</option>
                        <option value="cr">CR</option>
                        <option value="lf">LF</option>
                        <option value="crlf">CRLF</option>
                    </select>
                </div>
                <input type="text" id="sendInput" placeholder="输入内容，Enter 发送..." onkeydown="if(event.key==='Enter')sendData()">
                <button class="btn-send" onclick="sendData()">
                    <i class="ti ti-send" style="font-size:12px;"></i> 发送
                </button>
                <button class="btn-file" onclick="sendFile()"><i class="ti ti-file" style="font-size:12px;"></i> 文件</button>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="panel-right">

            <!-- 搜索 -->
            <div class="psec">
                <div class="psec-title"><i class="ti ti-search"></i> 搜索</div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索..." oninput="doSearch()">
                    <button class="btn btn-secondary" onclick="clearSearch()" style="padding:4px 8px;font-size:11px;">清除</button>
                </div>
                <label class="chk" style="margin-top:2px;">
                    <input type="checkbox" id="hexSearch"><label for="hexSearch">HEX 搜索</label>
                </label>
            </div>

            <!-- 统计 -->
            <div class="psec">
                <div class="psec-title"><i class="ti ti-chart-bar"></i> 统计信息</div>
                <div class="stat-grid">
                    <div class="stat-card" id="statTxBytes"><label>发送字节</label><div class="v" id="txBytes">0</div></div>
                    <div class="stat-card" id="statRxBytes"><label>接收字节</label><div class="v" id="rxBytes">0</div></div>
                    <div class="stat-card" id="statTxFrames"><label>发送帧</label><div class="v" id="txFrames">0</div></div>
                    <div class="stat-card" id="statRxFrames"><label>接收帧</label><div class="v" id="rxFrames">0</div></div>
                </div>
            </div>

            <!-- 显示设置 -->
            <div class="psec">
                <div class="psec-title"><i class="ti ti-settings"></i> 显示设置</div>
                <label class="chk"><input type="checkbox" id="autoScroll" checked><label for="autoScroll">自动滚动</label></label>
                <label class="chk"><input type="checkbox" id="showTimestamp" checked><label for="showTimestamp">时间戳</label></label>
                <label class="chk"><input type="checkbox" id="showDirection" checked><label for="showDirection">方向标识</label></label>
                <label class="chk"><input type="checkbox" id="hexDisplay"><label for="hexDisplay">HEX 显示</label></label>
                <label class="chk"><input type="checkbox" id="localEcho"><label for="localEcho">本地回显</label></label>
            </div>

            <!-- 接收设置 -->
            <div class="psec">
                <div class="psec-title"><i class="ti ti-adjustments"></i> 接收设置</div>
                <div class="setting-row"><label>帧间隔 ms</label><input type="number" id="frameInterval" value="30" min="10" max="1000"></div>
                <div class="setting-row"><label>最大行数</label><input type="number" id="maxLines" value="2000" min="100" max="50000" step="1000"></div>
            </div>

            <!-- 连接信息 -->
            <div class="psec">
                <div class="psec-title"><i class="ti ti-info-circle"></i> 连接信息</div>
                <div class="info-row"><label>设备</label><span class="v" id="infoDevice">-</span></div>
                <div class="info-row"><label>VID / PID</label><span class="v" id="infoVidPid">-</span></div>
                <div class="info-row"><label>连接时长</label><span class="v" id="infoDuration">-</span></div>
            </div>
        </div>
    </div>

    <!-- 快捷命令 -->
    <div class="quick-bar">
        <span class="qlabel">快捷</span>
        <button class="btn-q" onclick="quickSend('AT')">AT</button>
        <button class="btn-q" onclick="quickSend('AT+RST')">AT+RST</button>
        <button class="btn-q" onclick="quickSend('AT+GMR')">AT+GMR</button>
        <button class="btn-q" onclick="quickSend('help')">help</button>
        <button class="btn-q" onclick="quickSend('\x01\x03\x00\x00\x00\x04\x45\xC6')">Modbus</button>
    </div>
</div>

<script>
// ===== 状态 =====
let port=null, reader=null, writer=null, isConnected=false;
let txBytes=0, rxBytes=0, txFrames=0, rxFrames=0;
let readBuffer=[], frameTimer=null, connectStart=null, durTimer=null, lineCnt=0;

// ===== 环境检测 =====
(function(){
    if(!('serial' in navigator)){
        const d=document.createElement('div');
        d.style.cssText='background:#f85149;color:#fff;padding:7px 14px;font-size:12px;text-align:center;';
        d.innerHTML='⚠️ 浏览器不支持 Web Serial API，请使用 Chrome 89+ 或 Edge 89+';
        document.body.prepend(d);
        console.error('Web Serial API not supported');
    } else {
        console.log('Web Serial API supported');
    }
})();

// ===== 端口 =====
let grantedPorts = [];

// 刷新下拉框（只显示 grantedPorts 里的设备，不主动调用 getPorts）
function refreshPortsUI(){
    const sel = document.getElementById('portSelect');
    if (grantedPorts.length === 0) {
        sel.innerHTML = '<option value="">-- 点击+添加 --</option>';
        return;
    }
    sel.innerHTML = '<option value="">-- 选择设备 --</option>';
    grantedPorts.forEach((p, idx) => {
        const info = p.getInfo();
        const name = info.usbProductName || info.usbManufacturerName || '设备 ' + (idx+1);
        const vid = info.usbVendorId ? info.usbVendorId.toString(16).toUpperCase().padStart(4,'0') : '????';
        const pid = info.usbProductId ? info.usbProductId.toString(16).toUpperCase().padStart(4,'0') : '????';
        sel.innerHTML += '<option value="' + idx + '">' + name + ' [' + vid + ':' + pid + ']</option>';
    });
}

// 主动请求用户选择一个新设备
async function requestNewPort() {
    try {
        console.log('requestNewPort called');
        const newPort = await navigator.serial.requestPort();
        console.log('Port selected:', newPort);
        // 检查是否已存在
        const exists = grantedPorts.some(p => p === newPort);
        if (!exists) {
            grantedPorts.push(newPort);
        }
        refreshPortsUI();
        // 自动选中新添加的设备
        const sel = document.getElementById('portSelect');
        const idx = grantedPorts.indexOf(newPort);
        if (idx >= 0) {
            sel.value = idx;
            console.log('Port added and selected, index:', idx);
        }
    } catch (e) {
        console.error('requestNewPort error:', e);
        if (e.name !== 'NotFoundError') {
            addLine('sys', '选择设备失败: ' + e.message);
        }
    }
}
// 删除选中的设备
function removeSelectedPort() {
    const sel = document.getElementById('portSelect');
    const idx = sel.value;
    if (idx === '') {
        addLine('sys', '请先选择要删除的设备');
        return;
    }
    const idxNum = parseInt(idx);
    if (idxNum >= 0 && idxNum < grantedPorts.length) {
        const removed = grantedPorts.splice(idxNum, 1)[0];
        // 如果删除的是当前连接的设备，先断开
        if (isConnected && port === removed) {
            disconnect();
        }
        refreshPortsUI();
        addLine('sys', '设备已从列表移除（刷新页面后若之前授权过会再次出现）');
    }
}

async function toggleConnection(){ isConnected? await disconnect():await connect(); }

async function connect(){
    try{
        const baud=+document.getElementById('baudRate').value;
        const db=+document.getElementById('dataBits').value;
        const sb=+document.getElementById('stopBits').value;
        const par=document.getElementById('parity').value;
        const selIdx = document.getElementById('portSelect').value;

        // 如果有已授权设备且用户选了其中一个，直接用；否则弹出选择框
        if (selIdx !== '' && grantedPorts[selIdx]) {
            port = grantedPorts[selIdx];
        } else {
            port = await navigator.serial.requestPort();
            // 添加到缓存
            if (!grantedPorts.some(p => p === port)) {
                grantedPorts.push(port);
                refreshPortsUI();
            }
        }

        await port.open({baudRate:baud, dataBits:db, stopBits:sb, parity:par});
        writer=port.writable.getWriter();
        reader=port.readable.getReader();
        isConnected=true; connectStart=Date.now();
        uiConnected(); updateInfo(); startDur(); clearTerminal();
        addLine('sys','串口已连接  ['+baud+' bps]');
        readLoop();
    }catch(e){ if(e.name!=='NotFoundError') addLine('sys','连接失败: '+e.message); }
}

async function disconnect(){
    isConnected=false;
    if(frameTimer){clearTimeout(frameTimer);frameTimer=null;}
    if(durTimer){clearInterval(durTimer);durTimer=null;}
    try{if(reader){await reader.cancel();reader=null;}}catch(e){}
    try{if(writer){await writer.close();writer=null;}}catch(e){}
    try{if(port){await port.close();port=null;}}catch(e){}
    uiDisconnected(); resetInfo();
    addLine('sys','串口已断开');
}

// ===== UI =====
function uiConnected(){
    const b=document.getElementById('connectBtn');
    b.classList.add('is-connected');
    document.getElementById('connectText').textContent='断开';
    document.getElementById('connDot').classList.add('on');
    document.getElementById('connLabel').textContent='已连接';
    document.getElementById('connLabel').style.color='var(--green)';
}
function uiDisconnected(){
    const b=document.getElementById('connectBtn');
    b.classList.remove('is-connected');
    document.getElementById('connectText').textContent='连接';
    document.getElementById('connDot').classList.remove('on');
    document.getElementById('connLabel').textContent='未连接';
    document.getElementById('connLabel').style.color='';
}
function updateInfo(){
    if(!port)return;
    const info=port.getInfo();
    const vid=info.usbVendorId?'0x'+info.usbVendorId.toString(16).toUpperCase().padStart(4,'0'):'-';
    const pid=info.usbProductId?'0x'+info.usbProductId.toString(16).toUpperCase().padStart(4,'0'):'-';
    document.getElementById('infoDevice').textContent='USB 串口';
    document.getElementById('infoVidPid').textContent=vid+' / '+pid;
}
function startDur(){
    if(durTimer)clearInterval(durTimer);
    durTimer=setInterval(()=>{
        if(!connectStart)return;
        const s=Math.floor((Date.now()-connectStart)/1000);
        const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
        document.getElementById('infoDuration').textContent=
            (h?h+'h ':'')+(m?m+'m ':'')+sec+'s';
    },1000);
}
function resetInfo(){
    connectStart=null;
    if(durTimer){clearInterval(durTimer);durTimer=null;}
    ['infoDevice','infoVidPid','infoDuration'].forEach(id=>document.getElementById(id).textContent='-');
}

// ===== 收发 =====
async function readLoop(){
    const dec=new TextDecoder(document.getElementById('rxEncoding').value==='gbk'?'gbk':'utf-8');
    try{while(isConnected){
        const{value,done}=await reader.read();
        if(done)break;
        if(value){ readBuffer.push(...value); processBuf(); }
    }}catch(e){ if(isConnected)await disconnect(); }
}
function processBuf(){
    if(frameTimer)return;
    const iv=+document.getElementById('frameInterval').value||30;
    frameTimer=setTimeout(()=>{
        if(readBuffer.length){
            const data=new Uint8Array(readBuffer); readBuffer=[];
            showRx(data); rxFrames++; updateStats(); flash('statRxFrames');
        }
        frameTimer=null;
    },iv);
}
function showRx(data){
    const hex=document.getElementById('hexDisplay').checked;
    if(hex){
        let h='',a='';
        for(let i=0;i<data.length;i++){
            h+=data[i].toString(16).padStart(2,'0').toUpperCase()+' ';
            a+=(data[i]>=32&&data[i]<=126)?String.fromCharCode(data[i]):'.';
        }
        addLine('rx','<span class="data hex">'+h.trim()+'<span class="ascii-hint"> | '+a+'</span></span>');
    }else{
        const dec=new TextDecoder(document.getElementById('rxEncoding').value==='gbk'?'gbk':'utf-8');
        addLine('rx','<span class="data">'+esc(dec.decode(data))+'</span>');
    }
}
async function sendData(){
    if(!isConnected||!writer){addLine('sys','未连接');return;}
    let input=document.getElementById('sendInput').value;
    if(!input)return;
    const fmt=document.getElementById('sendFormat').value;
    const app=document.getElementById('appendMode').value;
    let bytes;
    if(fmt==='hex'){
        input=input.replace(/\s/g,'');
        if(!/^[0-9A-Fa-f]+$/.test(input)||input.length%2){addLine('sys','HEX格式错误');return;}
        bytes=new Uint8Array(input.match(/.{2}/g).map(b=>parseInt(b,16)));
    }else bytes=new TextEncoder().encode(input);
    if(app==='cr')bytes=new Uint8Array([...bytes,0x0d]);
    else if(app==='lf')bytes=new Uint8Array([...bytes,0x0a]);
    else if(app==='crlf')bytes=new Uint8Array([...bytes,0x0d,0x0a]);
    await writer.write(bytes);
    txBytes+=bytes.length; txFrames++; updateStats(); flash('statTxFrames');
    if(document.getElementById('localEcho').checked){
        if(fmt==='hex') addLine('tx','<span class="data hex">'+Array.from(bytes).map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ')+'</span>');
        else addLine('tx','<span class="data">'+esc(input)+'</span>');
    }
    document.getElementById('sendInput').value='';
}
function sendFile(){
    const i=document.createElement('input'); i.type='file';
    i.onchange=async()=>{
        if(!isConnected||!writer)return;
        const f=i.files[0], buf=await f.arrayBuffer();
        const bytes=new Uint8Array(buf);
        await writer.write(bytes);
        txBytes+=bytes.length; txFrames++; updateStats();
        addLine('sys','已发送文件: '+f.name+' ('+bytes.length+' 字节)');
    }; i.click();
}
async function quickSend(t){ document.getElementById('sendInput').value=t; await sendData(); }

// ===== 终端 =====
function addLine(type,html){
    const t=document.getElementById('terminal');
    if(t.querySelector('.empty-state')) t.innerHTML='';
    const d=document.createElement('div');
    d.className='line '+(type==='tx'?'tx-line':type==='rx'?'rx-line':'');
    let s='';
    // 时间戳 + 方向 + 数据 全部放在同一行
    if(document.getElementById('showTimestamp').checked){
        const n=new Date();
        s+='<span class="ts">'+n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0')+'.'+n.getMilliseconds().toString().padStart(3,'0')+'</span>';
    }
    if(document.getElementById('showDirection').checked){
        const dl=type==='tx'?'<span class="dir tx">TX</span>':type==='rx'?'<span class="dir rx">RX</span>':'<span class="dir sys">--</span>';
        s+=dl;
    }
    s+=html; d.innerHTML=s;
    t.appendChild(d); lineCnt++;
    document.getElementById('lineCount').textContent=lineCnt+' 行';
    if(document.getElementById('autoScroll').checked) t.scrollTop=t.scrollHeight;
    const mx=+document.getElementById('maxLines').value||2000;
    const lines=t.querySelectorAll('.line');
    while(lines.length>mx) t.removeChild(lines[0]);
}
function clearTerminal(){
    document.getElementById('terminal').innerHTML='<div class="empty-state"><i class="ti ti-terminal-2"></i><span>连接串口设备后开始接收数据</span></div>';
    lineCnt=0; document.getElementById('lineCount').textContent='0 行';
}

// ===== 统计 =====
function updateStats(){
    document.getElementById('txBytes').textContent=txBytes;
    document.getElementById('rxBytes').textContent=rxBytes;
    document.getElementById('txFrames').textContent=txFrames;
    document.getElementById('rxFrames').textContent=rxFrames;
}
function flash(id){
    const e=document.getElementById(id); if(!e)return;
    e.classList.add('flash'); setTimeout(()=>e.classList.remove('flash'),350);
}

// ===== 搜索 =====
function doSearch(){
    const t=document.getElementById('searchInput').value.trim().toLowerCase();
    document.querySelectorAll('#terminal .line').forEach(l=>{
        l.style.display=t? (l.textContent.toLowerCase().includes(t)?'':'none') :'';
    });
}
function clearSearch(){
    document.getElementById('searchInput').value='';
    document.querySelectorAll('#terminal .line').forEach(l=>l.style.display='');
}

// ===== 导出 =====
function exportData(){
    const lines=document.querySelectorAll('#terminal .line');
    if(!lines.length||(lines.length===1&&lines[0].closest('.empty-state'))){addLine('sys','无数据');return;}
    const c=Array.from(lines).map(l=>l.textContent).join('\n');
    const b=new Blob([c],{type:'text/plain'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='serial_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.txt';
    a.click(); URL.revokeObjectURL(a.href);
    addLine('sys','数据已导出');
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ===== 初始化 =====
// 不主动调用 getPorts()，避免已授权设备自动出现在列表中
// 用户需点击 + 按钮主动添加设备
refreshPortsUI();
</script>
</body>
</html>
